<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick-Launch - Test Reporter</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="quicklaunch.css">
</head>
<body>
  <!-- Global Application Header -->
  <header class="app-header">
    <div class="header-inner">
      <div style="display:flex; align-items:center;">
        <div class="brand">
          <div class="brand-dot"></div>
          <span class="brand-name">ZORO's <strong>Quick-Launch</strong></span>
        </div>
        <div class="header-nav">
          <a href="index.html" class="nav-link"><span>🏠</span> Zoro's Dashboard</a>
          <a href="synchub.html" class="nav-link"><span>📊</span> Sync Hub</a>
          <a href="productivity.html" class="nav-link"><span>⚡</span> Productivity</a>
          <a href="timesheet.html" class="nav-link"><span>📅</span> Timesheet</a>
          <a href="water.html" class="nav-link"><span>💧</span> Hydration</a>
          <a href="quicklaunch.html" class="nav-link active"><span>🚀</span> Quick-Launch</a>
        </div>
      </div>
      <div class="header-actions">
        <button id="btnThemeToggle" class="btn-theme-toggle" title="Toggle light/dark mode">🌙</button>
      </div>
    </div>
  </header>

  <main class="ql-layout">
    <div class="ql-main-col">
      <div class="ql-header">
        <div>
          <h1 class="ql-title">Quick-Launch</h1>
          <p class="ql-subtitle">Organize and launch your favorite links with a single click.</p>
        </div>
        <div class="ql-actions">
          <button id="btnAddFolder" class="ql-btn ql-btn-primary">+ New Folder</button>
        </div>
      </div>

      <!-- Folders Container -->
      <div id="foldersContainer" class="ql-folders-container">
        <!-- Folders will be rendered here via JS -->
      </div>
    </div>

    <!-- Emoji Sidebar -->
    <aside class="ql-emoji-sidebar">
      <h3>Emoji Picker</h3>
      <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px;">Click an emoji to copy it.</p>
      <div class="emoji-grid" id="emojiGrid"></div>
      <div id="emojiToast" class="copy-toast">Copied!</div>
    </aside>
  </main>

  <!-- Add/Edit Folder Modal -->
  <div id="folderModal" class="ql-modal hidden">
    <div class="ql-modal-content">
      <h3 id="folderModalTitle">New Folder</h3>
      <input type="text" id="folderNameInput" class="ql-input" placeholder="Folder Name (e.g. Work, Social)">
      <div class="ql-modal-actions">
        <button id="btnCancelFolder" class="ql-btn">Cancel</button>
        <button id="btnSaveFolder" class="ql-btn ql-btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Link Modal -->
  <div id="linkModal" class="ql-modal hidden">
    <div class="ql-modal-content">
      <h3 id="linkModalTitle">Add Link</h3>
      <input type="hidden" id="linkFolderId">
      <input type="hidden" id="linkId">
      
      <div class="ql-input-group">
        <label>Emoji Icon</label>
        <input type="text" id="linkEmojiInput" class="ql-input" placeholder="🌟" maxlength="5">
      </div>
      <div class="ql-input-group">
        <label>Link Name</label>
        <input type="text" id="linkNameInput" class="ql-input" placeholder="GitHub">
      </div>
      <div class="ql-input-group">
        <label>URL</label>
        <input type="url" id="linkUrlInput" class="ql-input" placeholder="https://github.com">
      </div>
      
      <div class="ql-modal-actions">
        <button id="btnCancelLink" class="ql-btn">Cancel</button>
        <button id="btnSaveLink" class="ql-btn ql-btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="quicklaunch.js"></script>
</body>
</html>
