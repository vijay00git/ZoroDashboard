<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick-Launch - Test Reporter</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/quicklaunch.css">
  <link rel="stylesheet" href="../css/ai.css">
  <style>
    body {
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.05), transparent 30%),
        radial-gradient(circle at 90% 80%, rgba(56, 189, 248, 0.05), transparent 30%);
      background-attachment: fixed;
    }
    
    [data-theme="light"] body {
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.08), transparent 30%),
        radial-gradient(circle at 90% 80%, rgba(56, 189, 248, 0.08), transparent 30%);
    }
  </style>
</head>
<body>
  <!-- Global Application Header -->
  <header class="app-header">
    <div class="header-inner">
      <div style="display:flex; align-items:center;">
        <div class="brand">
          <div class="brand-dot"></div>
          <span class="brand-name">ZORO's <strong>Quick-Launch</strong></span>
        </div>
        <div class="header-nav">
          <a href="../index.html" class="nav-link"><span>🏠</span> Zoro's Dashboard</a>
          <a href="synchub.html" class="nav-link"><span>📊</span> Sync Hub</a>
          <a href="productivity.html" class="nav-link"><span>⚡</span> Productivity</a>
          <a href="timesheet.html" class="nav-link"><span>📅</span> Timesheet</a>
          <a href="water.html" class="nav-link"><span>💧</span> Hydration</a>
          <a href="quicklaunch.html" class="nav-link active"><span>🚀</span> Quick-Launch</a>
          <a href="status.html" class="nav-link"><span>📝</span> Daily Status</a>
          <a href="goal.html" class="nav-link"><span>🎯</span> AI Goals</a>
          <a href="settings.html" class="nav-link"><span>⚙️</span> Settings</a>
        </div>
      </div>
      <div class="header-actions">
        <div id="navClock" style="font-family: var(--mono); font-size: 0.85rem; font-weight: 600; color: var(--text); padding: 0 1rem; border-right: 1px solid var(--border); margin-right: 0.5rem; display: flex; align-items: center; justify-content: center; min-width: 100px;">--:--:--</div>
        <button id="btnThemeToggle" class="btn-theme-toggle" title="Toggle light/dark mode">🌙</button>
      </div>
    </div>
  </header>

  <main class="ql-layout">
    <div class="ql-main-col">
      <div class="ql-header">
        <div>
          <h1 class="ql-title">Quick-Launch</h1>
          <p class="ql-subtitle">Organize and launch your favorite links with a single click.</p>
        </div>
        <div class="ql-actions">
          <button id="btnAddFolder" class="ql-btn ql-btn-primary">+ New Folder</button>
        </div>
      </div>

      <!-- Folders Container -->
      <div id="foldersContainer" class="ql-folders-container">
        <!-- Folders will be rendered here via JS -->
      </div>
    </div>

    <!-- Emoji Sidebar -->
    <aside class="ql-emoji-sidebar">
      <h3>Emoji Picker</h3>
      <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px;">Click an emoji to copy it.</p>
      <div class="emoji-grid" id="emojiGrid"></div>
      <div id="emojiToast" class="copy-toast">Copied!</div>
    </aside>
  </main>

  <!-- Add/Edit Folder Modal -->
  <div id="folderModal" class="ql-modal hidden">
    <div class="ql-modal-content">
      <h3 id="folderModalTitle">New Folder</h3>
      <div class="ql-input-group">
        <label>Folder Name</label>
        <input type="text" id="folderNameInput" class="ql-input" placeholder="e.g. Work, Social">
      </div>
      <div class="ql-input-group">
        <label>Folder Color</label>
        <div class="folder-color-picker" id="folderColorPicker">
          <div class="color-swatch selected" data-color="default" style="background: var(--bg2); border: 1px solid var(--border);" title="Default"></div>
          <div class="color-swatch" data-color="#ef4444" style="background: #ef4444;" title="Red"></div>
          <div class="color-swatch" data-color="#f97316" style="background: #f97316;" title="Orange"></div>
          <div class="color-swatch" data-color="#eab308" style="background: #eab308;" title="Yellow"></div>
          <div class="color-swatch" data-color="#22c55e" style="background: #22c55e;" title="Green"></div>
          <div class="color-swatch" data-color="#3b82f6" style="background: #3b82f6;" title="Blue"></div>
          <div class="color-swatch" data-color="#a855f7" style="background: #a855f7;" title="Purple"></div>
          <div class="color-swatch" data-color="#ec4899" style="background: #ec4899;" title="Pink"></div>
        </div>
        <input type="hidden" id="folderColorInput" value="default">
      </div>
      <div class="ql-modal-actions">
        <button id="btnCancelFolder" class="ql-btn">Cancel</button>
        <button id="btnSaveFolder" class="ql-btn ql-btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Link Modal -->
  <div id="linkModal" class="ql-modal hidden">
    <div class="ql-modal-content">
      <h3 id="linkModalTitle">Add Link</h3>
      <input type="hidden" id="linkFolderId">
      <input type="hidden" id="linkId">
      
      <div class="ql-input-group">
        <label>Emoji Icon <span style="font-size: 0.75rem; color: var(--text-muted); font-weight: normal;">(Leave empty for auto favicon)</span></label>
        <input type="text" id="linkEmojiInput" class="ql-input" placeholder="🌟" maxlength="5">
      </div>
      <div class="ql-input-group">
        <label>Link Name</label>
        <input type="text" id="linkNameInput" class="ql-input" placeholder="GitHub">
      </div>
      <div class="ql-input-group">
        <label>URL</label>
        <input type="url" id="linkUrlInput" class="ql-input" placeholder="https://github.com">
      </div>
      
      <div class="ql-modal-actions">
        <button id="btnCancelLink" class="ql-btn">Cancel</button>
        <button id="btnSaveLink" class="ql-btn ql-btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="../js/quicklaunch.js"></script>
  <script src="../js/ai.js"></script>
</body>
</html>
